<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CustomerSupport AI – Customer Service Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* … (all CSS unchanged) … */
    </style>
</head>
<body>

    <div class="app-container">

        <header class="header">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <div>
                    <span class="brand-name">CustomerSupport AI</span>
                    <span class="brand-sub">Customer Service Classifier</span>
                </div>
            </div>
            <div class="header-actions">
                <span class="badge"><i class="fas fa-brain" style="margin-right:6px;"></i>v1.0</span>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                    <span id="themeLabel">Dark</span>
                </button>
            </div>
        </header>

        <!-- Rest of the HTML unchanged (hero, input, result, history) -->
        <!-- ... -->

    </div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const state = {
            history: JSON.parse(localStorage.getItem('intentHistory') || '[]'),
            isDark: localStorage.getItem('intentTheme') === 'dark',
            isLoading: false,
        };

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  DOM REFS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const $ = (s) => document.querySelector(s);
        const queryInput = $('#queryInput');
        const classifyBtn = $('#classifyBtn');
        const resultContainer = $('#resultContainer');
        const emptyState = $('#emptyState');
        const resultCount = $('#resultCount');
        const historyList = $('#historyList');
        const clearHistoryBtn = $('#clearHistory');
        const themeToggle = $('#themeToggle');
        const themeIcon = $('#themeIcon');
        const themeLabel = $('#themeLabel');
        const toast = $('#toast');
        const toastMessage = $('#toastMessage');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  THEME
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function applyTheme(dark) {
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            themeIcon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
            themeLabel.textContent = dark ? 'Light' : 'Dark';
            localStorage.setItem('intentTheme', dark ? 'dark' : 'light');
            state.isDark = dark;
        }

        themeToggle.addEventListener('click', () => {
            applyTheme(!state.isDark);
        });

        applyTheme(state.isDark);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  TOAST
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        let toastTimer = null;

        function showToast(msg, icon = 'fa-circle-check') {
            toastMessage.textContent = msg;
            toast.querySelector('i').className = `fas ${icon}`;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  UI HELPERS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function getIntentIcon(intent) {
            const map = {
                cancel_order: 'fa-ban',
                change_shipping_address: 'fa-location-dot',
                check_cancellation_fee: 'fa-calculator',
                check_invoice: 'fa-receipt',
                check_payment_methods: 'fa-credit-card',
                check_refund_policy: 'fa-scale-balanced',
                complaint: 'fa-triangle-exclamation',
                contact_customer_service: 'fa-headset',
                contact_human_agent: 'fa-user-tie',
                create_account: 'fa-user-plus',
                delete_account: 'fa-user-minus',
                delivery_options: 'fa-truck-fast',
                delivery_period: 'fa-clock',
                edit_account: 'fa-user-pen',
                get_invoice: 'fa-file-invoice',
                get_refund: 'fa-money-bill-wave',
                newsletter_subscription: 'fa-newspaper',
                payment_issue: 'fa-circle-exclamation',
                place_order: 'fa-cart-shopping',
                recover_password: 'fa-key',
                registration_problems: 'fa-circle-question',
                review: 'fa-star',
                set_up_shipping_address: 'fa-address-card',
                switch_account: 'fa-arrows-rotate',
                track_order: 'fa-magnifying-glass',
                track_refund: 'fa-rotate-left',
            };
            return map[intent] || 'fa-tag';
        }

        function formatIntentLabel(intent) {
            return intent
                .split('_')
                .map(w => w.charAt(0).toUpperCase() + w.slice(1))
                .join(' ');
        }

        function getConfidenceColor(pct) {
            if (pct >= 75) return 'var(--accent)';
            if (pct >= 50) return '#f59e0b';
            return '#ef4444';
        }

        function getPriorityColor(priority) {
            if (priority === 'High') return '#dc2626';
            if (priority === 'Medium') return '#ca8a04';
            return '#0369a1';
        }

        function getPriorityBg(priority) {
            if (priority === 'High') return '#fee2e2';
            if (priority === 'Medium') return '#fef9c3';
            return '#e0f2fe';
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RENDER RESULT (No all_intents)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function renderResult(data) {
            const { customer_query, intent, confidence, department, priority, action, ai_reply } = data;

            emptyState.style.display = 'none';

            const pct = Math.round(confidence * 100);
            const color = getConfidenceColor(pct);
            const icon = getIntentIcon(intent);
            const priColor = getPriorityColor(priority);
            const priBg = getPriorityBg(priority);

            const card = document.createElement('div');
            card.className = 'intent-card';
            card.style.animation = 'fadeSlideUp 0.5s ease-out';

            card.innerHTML = `
                <div class="icon-wrap">
                    <i class="fas ${icon}"></i>
                </div>
                <div class="content">
                    <div class="intent-name">
                        ${formatIntentLabel(intent)}
                        <span class="tag">Primary</span>
                    </div>
                    <div class="confidence">
                        <span style="display:flex;align-items:center;gap:4px;">
                            <i class="fas fa-circle" style="color:${color};font-size:10px;"></i>
                            Confidence
                        </span>
                        <div class="bar-wrap">
                            <div class="bar-fill" style="width:${pct}%;background:${color};"></div>
                        </div>
                        <span class="pct">${pct}%</span>
                    </div>

                    <!-- Department, Priority, Action -->
                    <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;font-size:13px;align-items:center;">
                        <span style="background:var(--accent-light);color:var(--accent);padding:2px 12px;border-radius:40px;display:inline-flex;align-items:center;gap:4px;">
                            <i class="fas fa-building"></i> ${department}
                        </span>
                        <span style="background:${priBg};color:${priColor};padding:2px 12px;border-radius:40px;font-weight:600;display:inline-flex;align-items:center;gap:4px;">
                            <i class="fas fa-flag"></i> ${priority} Priority
                        </span>
                        <span style="color:var(--text-muted);display:inline-flex;align-items:center;gap:4px;">
                            <i class="fas fa-bolt"></i> ${action}
                        </span>
                    </div>

                    <!-- AI Reply -->
                    <div style="margin-top:12px;background:var(--bg-input);border-radius:var(--radius-sm);padding:12px 16px;border-left:4px solid var(--accent);">
                        <div style="font-size:13px;color:var(--text-muted);display:flex;gap:8px;align-items:center;">
                            <i class="fas fa-robot" style="color:var(--accent);"></i>
                            <span style="font-weight:500;">AI Suggested Reply</span>
                        </div>
                        <div style="font-size:14px;margin-top:4px;color:var(--text-primary);">
                            ${ai_reply}
                        </div>
                    </div>

                    <div class="meta" style="margin-top:8px;">
                        <i class="fas fa-quote-left" style="opacity:0.4;"></i>
                        ${customer_query.length > 80 ? customer_query.slice(0, 80) + '…' : customer_query}
                    </div>
                </div>
            `;

            resultContainer.innerHTML = '';
            resultContainer.appendChild(card);

            resultCount.textContent = `Top intent · ${pct}% confidence`;
            addHistory(customer_query, intent, pct);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CLASSIFY (API call)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        async function classify(query) {
            if (!query.trim()) {
                showToast('Please enter a query first.', 'fa-triangle-exclamation');
                return;
            }

            if (state.isLoading) return;

            state.isLoading = true;
            classifyBtn.disabled = true;
            classifyBtn.innerHTML = `<span class="loader"></span> Analyzing…`;

            try {
                const response = await fetch('/classify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query.trim() }),
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Server error');
                }

                const data = await response.json();
                renderResult(data);
                showToast(`Classified as “${formatIntentLabel(data.intent)}”`, 'fa-circle-check');

            } catch (err) {
                console.error(err);
                showToast(err.message || 'Something went wrong.', 'fa-circle-xmark');
                emptyState.style.display = 'block';
                emptyState.innerHTML = `
                    <i class="fas fa-circle-xmark" style="color:#ef4444;"></i>
                    <h3 style="color:#ef4444;">Error</h3>
                    <p>${err.message || 'Could not classify. Please try again.'}</p>
                `;
                resultContainer.innerHTML = '';
                resultCount.textContent = '';
            } finally {
                state.isLoading = false;
                classifyBtn.disabled = false;
                classifyBtn.innerHTML = `<i class="fas fa-arrow-right"></i> <span>Classify</span>`;
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  HISTORY (unchanged)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function addHistory(query, intent, pct) {
            const entry = {
                query: query.trim(),
                intent,
                pct,
                time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
                ts: Date.now(),
            };
            state.history.unshift(entry);
            if (state.history.length > 50) state.history.pop();
            localStorage.setItem('intentHistory', JSON.stringify(state.history));
            renderHistory();
        }

        function renderHistory() {
            if (state.history.length === 0) {
                historyList.innerHTML = `
                    <div style="text-align:center;padding:28px 0;color:var(--text-muted);font-size:13px;">
                        <i class="fas fa-clock" style="display:block;font-size:28px;margin-bottom:8px;opacity:0.4;"></i>
                        No history yet
                    </div>
                `;
                return;
            }

            historyList.innerHTML = state.history.map((h) => `
                <div class="history-item">
                    <span class="h-query">${escapeHtml(h.query)}</span>
                    <span class="h-intent">${formatIntentLabel(h.intent)} · ${h.pct}%</span>
                    <span class="h-time">${h.time}</span>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        clearHistoryBtn.addEventListener('click', () => {
            state.history = [];
            localStorage.setItem('intentHistory', '[]');
            renderHistory();
            showToast('History cleared', 'fa-trash-alt');
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  EVENT BINDING
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        classifyBtn.addEventListener('click', () => classify(queryInput.value));

        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                classify(queryInput.value);
            }
        });

        document.querySelectorAll('.quick-chip').forEach((chip) => {
            chip.addEventListener('click', () => {
                queryInput.value = chip.dataset.query;
                classify(queryInput.value);
            });
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        renderHistory();

        if (queryInput.value.trim()) {
            setTimeout(() => classify(queryInput.value), 400);
        }

        console.log('🚀 CustomerSupport AI ready');
    </script>

</body>
</html>
